# Serves the compiled SPA and reverse-proxies /api to the backend
# service on the docker-compose internal network. The SPA uses
# relative `/api/...` URLs, so browsers only see the frontend port.

upstream backend {
  server backend:8080;
}

server {
  listen       80;
  listen  [::]:80;
  server_name  _;

  root /usr/share/nginx/html;
  index index.html;

  # Forward REST requests to the Go backend.
  location /api/ {
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_pass_request_headers on;
    client_max_body_size 15m;   # accommodates 10-MB report attachments
  }

  # SPA fallback: any unknown path serves index.html so React Router
  # can handle client-side routes like /customers/:id.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Small static-asset caching.
  location ~* \.(js|css|png|svg|ico|woff2?)$ {
    expires 7d;
    access_log off;
    try_files $uri =404;
  }
}
