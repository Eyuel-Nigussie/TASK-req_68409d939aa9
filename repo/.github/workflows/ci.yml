name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download deps
        run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test with coverage
        run: go test -race -cover ./...

  backend-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: oops
          POSTGRES_PASSWORD: oops
          POSTGRES_DB: oops_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U oops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      INTEGRATION_DB: postgres://oops:oops@localhost:5432/oops_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Download deps
        run: go mod download
      - name: Run integration tests
        run: go test -run TestPostgres_Integration ./internal/store/...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
